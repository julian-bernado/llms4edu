<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analysis Activity · Workshop</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body data-page="analysis">
  <header class="site-header">
    <a class="brand" href="/home">Leveraging LLMs for Data Analysis in Education Research</a>
    <span class="participant" data-participant></span>
  </header>
  <main class="page">
    <nav class="breadcrumbs" aria-label="Breadcrumb"><a href="/home">Activities</a><span>/</span><span>Analysis</span></nav>
    <div class="title-row">
      <div><p class="eyebrow">Activity 02</p><h1>Analysis</h1></div>
      <a class="text-link" href="/transcripts">Browse all transcripts →</a>
    </div>

    <section class="card form-card" aria-labelledby="prompt-heading">
      <h2 id="prompt-heading">Configure the prompt</h2>
      <label for="system-prompt">System prompt</label>
      <textarea id="system-prompt" class="system-prompt" rows="7" readonly aria-describedby="system-prompt-help">Loading…</textarea>
      <p id="system-prompt-help" class="field-help">This system prompt cannot be edited.</p>
      <label for="user-prompt">Your prompt</label>
      <textarea id="user-prompt" rows="6" required placeholder="What kinds of utterances would you like to find?"></textarea>
      <div class="form-actions">
        <button id="run-button" type="button">Run over 30 transcripts</button>
        <span id="run-message" class="status-message" role="status" aria-live="polite"></span>
      </div>
    </section>

    <section id="progress-section" class="card progress-card" hidden aria-labelledby="progress-label">
      <div class="progress-copy"><h2 id="progress-label">Running prompt</h2><span id="progress-count">0 / 30</span></div>
      <progress id="run-progress" value="0" max="30">0%</progress>
    </section>

    <section id="results-section" class="results-section" hidden aria-labelledby="results-heading">
      <div class="section-heading"><div><p class="eyebrow">Saved result</p><h2 id="results-heading">Examples</h2></div><p id="match-total" class="result-total"></p></div>
      <details class="card examples-box" open>
        <summary>Identified utterances</summary>
        <div id="analysis-results" class="transcript-groups"></div>
      </details>
    </section>
  </main>
</body>
</html>
