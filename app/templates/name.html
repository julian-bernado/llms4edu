<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workshop</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body data-page="name" class="centered-page">
  <main class="card name-card">
    <p class="eyebrow">Leveraging LLMs for Data Analysis in Education Research</p>
    <h1>Welcome to the workshop</h1>
    <p class="lede">Enter your name to save and return to your activity results on this device.</p>
    <form id="name-form">
      <label for="participant-name">Your name</label>
      <input id="participant-name" name="name" type="text" autocomplete="name" required maxlength="100" autofocus>
      <button type="submit">Continue</button>
    </form>
  </main>
</body>
</html>
